<svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg-card { fill: #21262d; }
    .border { stroke: #30363d; }
    .arrow { stroke: #8b949e; fill: #8b949e; }
    .text { fill: #c9d1d9; }
    @media (prefers-color-scheme: light) {
      .bg-card { fill: #ffffff; }
      .border { stroke: #d0d7de; }
      .arrow { stroke: #57606a; fill: #57606a; }
      .text { fill: #24292f; }
    }
  </style>
  <text x="350" y="30" text-anchor="middle" class="text" font-size="18" font-weight="700">C# Data Types</text>
  
  <rect x="20" y="60" width="120" height="110" rx="10" fill="#58a6ff"/>
  <text x="80" y="95" text-anchor="middle" fill="white" font-size="13" font-weight="700">int, long</text>
  <text x="80" y="113" text-anchor="middle" fill="white" font-size="13">float, double</text>
  <text x="80" y="140" text-anchor="middle" fill="white" font-size="12">Numbers</text>
  <text x="80" y="158" text-anchor="middle" fill="white" font-size="11" opacity="0.8">25, 3.14, 99.99</text>
  
  <rect x="155" y="60" width="120" height="110" rx="10" fill="#a371f7"/>
  <text x="215" y="95" text-anchor="middle" fill="white" font-size="13" font-weight="700">string</text>
  <text x="215" y="125" text-anchor="middle" fill="white" font-size="12">Text</text>
  <text x="215" y="150" text-anchor="middle" fill="white" font-size="11" opacity="0.8">"Hello World"</text>
  
  <rect x="290" y="60" width="120" height="110" rx="10" fill="#3fb950"/>
  <text x="350" y="95" text-anchor="middle" fill="white" font-size="13" font-weight="700">bool</text>
  <text x="350" y="125" text-anchor="middle" fill="white" font-size="12">True/False</text>
  <text x="350" y="150" text-anchor="middle" fill="white" font-size="11" opacity="0.8">true, false</text>
  
  <rect x="425" y="60" width="120" height="110" rx="10" fill="#d29922"/>
  <text x="485" y="95" text-anchor="middle" fill="white" font-size="13" font-weight="700">DateTime</text>
  <text x="485" y="125" text-anchor="middle" fill="white" font-size="12">Dates & Time</text>
  <text x="485" y="150" text-anchor="middle" fill="white" font-size="11" opacity="0.8">DateTime.Now</text>
  
  <rect x="560" y="60" width="120" height="110" rx="10" fill="#f85149"/>
  <text x="620" y="95" text-anchor="middle" fill="white" font-size="13" font-weight="700">decimal</text>
  <text x="620" y="125" text-anchor="middle" fill="white" font-size="12">Money (precise)</text>
  <text x="620" y="150" text-anchor="middle" fill="white" font-size="11" opacity="0.8">99.99m</text>
</svg>
